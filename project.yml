name: Talrand
options:
  bundleIdPrefix: com.talrand
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  Talrand:
    type: application
    platform: iOS
    sources:
      - Talrand
    resources:
      - path: Talrand/Resources
        buildPhase: resources
    info:
      path: Talrand/Info.plist
      properties:
        NSCameraUsageDescription: "Talrand uses the camera to scan collector numbers on your cards"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Surfaces the backup file under "Talrand" in the Files app's iCloud Drive.
        NSUbiquitousContainers:
          iCloud.com.talrand.app:
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerName: Talrand
            NSUbiquitousContainerSupportedFolderLevels: Any
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.talrand.app
        INFOPLIST_FILE: Talrand/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.games"
        CODE_SIGN_ENTITLEMENTS: Talrand/Talrand.entitlements
    # DEVELOPMENT_TEAM lives only in the git-ignored Local.xcconfig, so the
    # generated project carries the signing reference but never the team id.
    configFiles:
      Debug: Local.xcconfig
      Release: Local.xcconfig
    # Defining a scheme makes xcodegen emit a SHARED scheme whose Test action
    # runs TalrandTests — this is what enables Cmd+U on the Talrand scheme.
    scheme:
      testTargets:
        - TalrandTests
  TalrandTests:
    type: bundle.unit-test
    platform: iOS
    # Non-hosted logic test: compiles the pure scanner seam directly so it never
    # launches the app (no SwiftData/network/camera side effects). Replays
    # fixture card photos through the real crop -> OCR -> parse logic.
    sources:
      - TalrandTests
      - path: Talrand/Services/BackupCodec.swift
      - path: Talrand/Services/ScanOCR.swift
      - path: Talrand/Services/CollectorNumberParser.swift
      - path: Talrand/Services/DeckResolver.swift
      - path: Talrand/Services/MatchRanking.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.talrand.tests
        GENERATE_INFOPLIST_FILE: "YES"
