name: Talrand
options:
  bundleIdPrefix: com.talrand
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  Talrand:
    type: application
    platform: iOS
    sources:
      - Talrand
    resources:
      - path: Talrand/Resources
        buildPhase: resources
    info:
      path: Talrand/Info.plist
      properties:
        NSCameraUsageDescription: "Talrand uses the camera to scan collector numbers on your cards"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.talrand.app
        INFOPLIST_FILE: Talrand/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
