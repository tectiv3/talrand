name: MTGBlue
options:
  bundleIdPrefix: com.mtgblue
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  MTGBlue:
    type: application
    platform: iOS
    sources:
      - MTGBlue
    resources:
      - path: MTGBlue/Resources
        buildPhase: resources
    info:
      path: MTGBlue/Info.plist
      properties:
        NSCameraUsageDescription: "MTG Blue uses the camera to scan collector numbers on your cards"
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mtgblue.app
        INFOPLIST_FILE: MTGBlue/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
